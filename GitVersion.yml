mode: ContinuousDeployment
tag-prefix: '[vV]'

branches:
  main:
    regex: ^main$
    label: beta
    increment: None

  develop:
    regex: ^develop$
    label: alpha
    increment: None
    source-branches:
      - main

  pull-request:
    label: pr
    increment: None

ignore:
  sha: []
