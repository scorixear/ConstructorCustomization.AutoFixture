mode: ContinuousDeployment
next-version: 0.0.0
tag-prefix: '[vV]'

branches:
  main:
    regex: ^main$
    tag: beta
    increment: None

  develop:
    regex: ^develop$
    tag: alpha
    increment: None
    source-branches:
      - main

  pull-request:
    tag: pr
    increment: None

ignore:
  sha: []
