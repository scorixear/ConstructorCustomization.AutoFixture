name: Publish NuGet Package

on:
    release:
        types:
            - published

permissions:
    contents: read

concurrency:
    group: publish-nuget
    cancel-in-progress: false

jobs:
    publish:
        if: ${{ github.event.release.target_commitish == 'main' && startsWith(github.event.release.tag_name, 'v') }}
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.release.tag_name }}
                  fetch-depth: 0

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: 10.0.x

            - name: Setup GitVersion
              uses: gittools/actions/gitversion/setup@v4
              with:
                  versionSpec: 6.x

            - name: Resolve Version
              id: gitversion
              shell: bash
              run: |
                  set -euo pipefail

                  semver="$(dotnet-gitversion /showvariable SemVer)"

                  if [ -z "${semver}" ]; then
                    echo "GitVersion SemVer is empty."
                    exit 1
                  fi

                  echo "semver=${semver}" >> "${GITHUB_OUTPUT}"

            - name: Restore
              run: dotnet restore

            - name: Build
              run: dotnet build --configuration Release --no-restore /p:Version=${{ steps.gitversion.outputs.semver }}

            - name: Test
              run: dotnet test --configuration Release --no-build --verbosity normal

            - name: Pack
              run: >-
                  dotnet pack ConstructorCustomization.AutoFixture/ConstructorCustomization.AutoFixture.csproj
                  --configuration Release
                  --no-build
                  --output ./artifacts
                  /p:PackageVersion=${{ steps.gitversion.outputs.semver }}
                  /p:Version=${{ steps.gitversion.outputs.semver }}

            - name: Publish package to nuget.org
              shell: bash
              run: |
                  set -euo pipefail
                  shopt -s nullglob

                  packages=(./artifacts/*.nupkg)
                  for package in "${packages[@]}"; do
                    if [[ "${package}" == *.snupkg ]]; then
                      continue
                    fi

                    dotnet nuget push "${package}" \
                      --source https://api.nuget.org/v3/index.json \
                      --api-key "${{ secrets.NUGET_API_KEY }}" \
                      --skip-duplicate
                  done

            - name: Publish symbols to nuget.org
              shell: bash
              run: |
                  set -euo pipefail
                  shopt -s nullglob

                  symbol_packages=(./artifacts/*.snupkg)
                  if [ "${#symbol_packages[@]}" -eq 0 ]; then
                    echo "No symbol packages found."
                    exit 0
                  fi

                  for symbol_package in "${symbol_packages[@]}"; do
                    dotnet nuget push "${symbol_package}" \
                      --source https://api.nuget.org/v3/index.json \
                      --api-key "${{ secrets.NUGET_API_KEY }}" \
                      --skip-duplicate
                  done

            - name: Workflow Summary
              run: |
                  echo "SemVer: ${{ steps.gitversion.outputs.semver }}" >> "$GITHUB_STEP_SUMMARY"
                  echo "Package version: ${{ steps.gitversion.outputs.semver }}" >> "$GITHUB_STEP_SUMMARY"
                  echo "Feed: https://api.nuget.org/v3/index.json" >> "$GITHUB_STEP_SUMMARY"
